name: CI/CD Pipeline - Deploy to Anypoint Platform

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  MAVEN_OPTS: -Xmx3072m
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Run tests
      run: mvn clean test ${{ env.MAVEN_CLI_OPTS }}
      
    - name: Build application
      run: mvn clean compile ${{ env.MAVEN_CLI_OPTS }}
      
    - name: Package application
      run: mvn clean package ${{ env.MAVEN_CLI_OPTS }} -DskipTests
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: mule-application
        path: target/*.jar

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: mule-application
        path: target/
        
    - name: Deploy to CloudHub 2.0 - Development
      run: |
        mvn clean deploy ${{ env.MAVEN_CLI_OPTS }} \
          -DmuleDeploy \
          -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
          -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
          -Danypoint.environment="${{ secrets.DEV_ENVIRONMENT }}" \
          -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
          -Dapplication.name="hello-world-mule-dev" \
          -Dmule.version="${{ vars.MULE_VERSION || '4.4.0' }}" \
          -Dworkers="1" \
          -DworkerType="MICRO" \
          -Dregion="us-east-1"

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        
    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: mule-application
        path: target/
        
    - name: Deploy to CloudHub 2.0 - Production
      run: |
        mvn clean deploy ${{ env.MAVEN_CLI_OPTS }} \
          -DmuleDeploy \
          -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
          -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
          -Danypoint.environment="${{ secrets.PROD_ENVIRONMENT }}" \
          -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
          -Dapplication.name="hello-world-mule-prod" \
          -Dmule.version="${{ vars.MULE_VERSION || '4.4.0' }}" \
          -Dworkers="2" \
          -DworkerType="MICRO" \
          -Dregion="us-east-1"