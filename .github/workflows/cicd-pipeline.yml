name: Deploy to CloudHub 2.0
 
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v4
 
      -
        name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
 
      -
        name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
 
      -
        name: Create Maven settings.xml
        env:
          ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
          ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-platform</id>
                <username>${ANYPOINT_USERNAME}</username>
                <password>${ANYPOINT_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
 
      -
        name: Build with Maven
        run: mvn clean package -DskipMunitTests
 
      -
        name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mule-application
          path: target/*.jar
          retention-days: 30
 
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
 
    steps:
      -
        name: Checkout code
        uses: actions/checkout@v4
 
      -
        name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
 
      -
        name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mule-application
          path: target
 
      -
        name: Create Maven settings.xml
        env:
          ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
          ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-platform</id>
                <username>${ANYPOINT_USERNAME}</username>
                <password>${ANYPOINT_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
 
      -
        name: Deploy to CloudHub 2.0
        run: mvn deploy -DmuleDeploy -DskipMunitTests
 
      -
        name: Deployment Status
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "Check Anypoint Platform for actual deployment status."