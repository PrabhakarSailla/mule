name: CI/CD Pipeline - Deploy to Anypoint Platform

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  MAVEN_OPTS: -Xmx3072m
  MAVEN_CLI_OPTS: --batch-mode --errors --fail-at-end --show-version

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Run tests
      run: mvn clean test ${{ env.MAVEN_CLI_OPTS }}
      
    - name: Build application
      run: mvn clean compile ${{ env.MAVEN_CLI_OPTS }}
      
    - name: Package application
      run: mvn clean package ${{ env.MAVEN_CLI_OPTS }} -DskipTests
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mule-application
        path: target/*.jar

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: mule-application
        path: target/
        
    - name: Validate deployment prerequisites
      run: |
        echo "Validating deployment prerequisites..."
        if [ -z "${{ secrets.ANYPOINT_USERNAME }}" ]; then
          echo "❌ ERROR: ANYPOINT_USERNAME secret is not configured"
          exit 1
        fi
        if [ -z "${{ secrets.ANYPOINT_PASSWORD }}" ]; then
          echo "❌ ERROR: ANYPOINT_PASSWORD secret is not configured"
          exit 1
        fi
        echo "✅ All required secrets are configured"
        
    - name: Deploy to CloudHub 2.0 - Development
      run: |
        echo "Starting deployment to Development environment..."
        mvn clean deploy ${{ env.MAVEN_CLI_OPTS }} \
          -DmuleDeploy \
          -Pdev \
          -Danypoint.username="${{ secrets.ANYPOINT_USERNAME }}" \
          -Danypoint.password="${{ secrets.ANYPOINT_PASSWORD }}" \
          -Danypoint.environment="${{ vars.DEV_ENVIRONMENT || 'Sandbox' }}" \
          -Danypoint.businessGroup="${{ secrets.BUSINESS_GROUP }}" \
          -Danypoint.applicationName="hello-world-mule-dev" \
          -Dmule.version="${{ vars.MULE_VERSION || '4.11.2' }}" \
          -Dtarget="Cloudhub-US-East-2" \
          -Dreplicas="1" \
          -DvCores="0.1" \
          -Dhttp.port="8081" \
          -Dsecure.key="${{ secrets.SECURE_KEY || 'defaultSecureKey123!' }}" \
          -DskipDeploymentVerification=false \
          -X

  notify:
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify deployment status
      run: |
        if [[ "${{ needs.deploy-dev.result }}" == "success" ]]; then
          echo "✅ Deployment successful to Development environment"
        else
          echo "❌ Deployment failed in Development environment"
        fi
