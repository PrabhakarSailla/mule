# Deployment Configuration Properties
# This file contains default values for deployment parameters
# Override these values using Maven command line properties or CI/CD variables

# Application Configuration
application.name=hello-world-mule
application.version=1.0.1
mule.version=4.11.2

# CloudHub Configuration
workerType=MICRO
workers=1
region=us-east-2
target=CloudHub-US-East-2
replicas=1

# Security Properties
secure.key=changeMe!
encryption.algorithm=AES
keystore.location=classpath:keystore.jks
keystore.password=changeme

# HTTP Configuration
http.port=8081
https.port=8082
http.host=0.0.0.0

# Monitoring and Logging
log.level=INFO
monitoring.enabled=true
metrics.enabled=true
anypoint.platform.config.analytics.agent.enabled=true

# Environment Specific Properties
# Development Environment
dev.application.name=hello-world-mule-dev
dev.workers=1
dev.workerType=MICRO
dev.replicas=1
dev.environment=Sandbox
dev.region=us-east-2
dev.log.level=DEBUG

# Staging Environment
staging.application.name=hello-world-mule-staging
staging.workers=1
staging.workerType=SMALL
staging.replicas=1
staging.environment=Design
staging.region=us-east-2
staging.log.level=INFO

# Production Environment
prod.application.name=hello-world-mule-prod
prod.workers=2
prod.workerType=SMALL
prod.replicas=2
prod.environment=Production
prod.region=us-east-2
prod.log.level=WARN

# CloudHub 2.0 Specific Properties
objectStoreV2=true
skipDeploymentVerification=false
deploymentTimeout=1200000

# Runtime Properties for Application
mule.env=dev
mule.encryption.key=${secure.key}

# Database Configuration (if needed)
# db.host=localhost
# db.port=5432
# db.username=admin
# db.password=password
# db.database=muleapp

# External Services Configuration (if needed)
# api.base.url=https://api.example.com
# api.timeout=30000
# api.retry.attempts=3

# CloudHub Networking (if VPN or VPC is needed)
# vpc.id=vpc-12345
# vpc.subnet=subnet-67890